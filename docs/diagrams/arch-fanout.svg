<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748B"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2563EB"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7C3AED"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="720" height="360" fill="#F8FAFC" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">FanoutBus — Broadcast Path</text>

  <!-- Mutation source -->
  <rect x="40" y="50" width="170" height="60" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#5B21B6">Mutation</text>
  <text x="125" y="89" text-anchor="middle" font-size="10" fill="#7C3AED">state.apply() complete</text>
  <text x="125" y="103" text-anchor="middle" font-size="10" fill="#7C3AED">returns (version, ops)</text>

  <!-- encode once -->
  <line x1="210" y1="80" x2="258" y2="80" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="260" y="52" width="180" height="58" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="74" text-anchor="middle" font-size="12" font-weight="600" fill="#065F46">encode_delta_body()</text>
  <text x="350" y="90" text-anchor="middle" font-size="11" fill="#047857">body_mp: Vec&lt;u8&gt;</text>
  <rect x="362" y="98" width="66" height="16" rx="8" fill="#059669"/>
  <text x="395" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">ONCE per write</text>

  <!-- broadcast_encoded -->
  <line x1="440" y1="80" x2="488" y2="80" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="490" y="52" width="190" height="58" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="585" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">broadcast_encoded()</text>
  <text x="585" y="88" text-anchor="middle" font-size="11" fill="#B45309">shard lock — read snapshot</text>
  <text x="585" y="104" text-anchor="middle" font-size="11" fill="#B45309">lock released before sends</text>

  <!-- Subscriber sessions -->
  <line x1="520" y1="110" x2="160" y2="178" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="585" y1="110" x2="360" y2="178" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="650" y1="110" x2="560" y2="178" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <text x="300" y="155" font-size="10" fill="#2563EB">delta_bytes(stream_id, body_mp)</text>
  <text x="300" y="167" font-size="10" fill="#64748B">— small header prefix per subscriber, body shared —</text>

  <!-- Session boxes -->
  <rect x="60"  y="180" width="200" height="80" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="260" y="180" width="200" height="80" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="460" y="180" width="200" height="80" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="160" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">Session A (other watcher)</text>
  <text x="360" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">Session B (other watcher)</text>
  <text x="560" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">Session C (writer*)</text>

  <text x="160" y="220" text-anchor="middle" font-size="10" fill="#64748B">channel send</text>
  <text x="360" y="220" text-anchor="middle" font-size="10" fill="#64748B">channel send</text>
  <text x="560" y="220" text-anchor="middle" font-size="10" fill="#64748B">direct ws_tx.send()</text>

  <!-- ws.send arrows down -->
  <line x1="160" y1="260" x2="160" y2="285" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="260" x2="360" y2="285" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="260" x2="560" y2="285" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- WS labels -->
  <rect x="72"  y="287" width="176" height="30" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="272" y="287" width="176" height="30" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="472" y="287" width="176" height="30" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="160" y="306" text-anchor="middle" font-size="10" fill="#475569">ws.send(DELTA)</text>
  <text x="360" y="306" text-anchor="middle" font-size="10" fill="#475569">ws.send(DELTA)</text>
  <text x="560" y="306" text-anchor="middle" font-size="10" fill="#475569">ws.send(DELTA)  ← no channel hop</text>

  <!-- Note about writer -->
  <text x="360" y="345" text-anchor="middle" font-size="10" fill="#94A3B8">* Writer session receives its own DELTA via direct ws_tx — bypasses the channel (saves one async wakeup)</text>
</svg>

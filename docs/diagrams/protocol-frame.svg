<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="700" height="200" fill="#F8FAFC" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">SODP Wire Frame — MessagePack 4-element Array</text>

  <!-- Frame bar -->
  <rect x="20" y="46" width="660" height="64" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Segment 1: frame_type -->
  <rect x="20" y="46" width="100" height="64" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="90" y="46" width="30" height="64" fill="#FEE2E2" stroke="none"/>
  <!-- Remove right radius on segment 1 -->
  <text x="70" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">frame_type</text>
  <text x="70" y="88" text-anchor="middle" font-size="11" fill="#DC2626">u8</text>
  <text x="70" y="102" text-anchor="middle" font-size="10" fill="#B91C1C">0x01 – 0x0D</text>

  <!-- Segment 2: stream_id -->
  <rect x="120" y="46" width="140" height="64" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="190" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">stream_id</text>
  <text x="190" y="88" text-anchor="middle" font-size="11" fill="#D97706">u32</text>
  <text x="190" y="102" text-anchor="middle" font-size="10" fill="#B45309">0 = control  ·  ≥10 = subscription</text>

  <!-- Segment 3: seq -->
  <rect x="260" y="46" width="130" height="64" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="325" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">seq</text>
  <text x="325" y="88" text-anchor="middle" font-size="11" fill="#059669">u64</text>
  <text x="325" y="102" text-anchor="middle" font-size="10" fill="#047857">monotonic per direction</text>

  <!-- Segment 4: body -->
  <rect x="390" y="46" width="290" height="64" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="390" y="46" width="30" height="64" fill="#DBEAFE" stroke="none"/>
  <text x="535" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">body</text>
  <text x="535" y="88" text-anchor="middle" font-size="11" fill="#2563EB">map | null</text>
  <text x="535" y="102" text-anchor="middle" font-size="10" fill="#3B82F6">frame-type-specific payload  ·  or null (e.g. HEARTBEAT)</text>

  <!-- Dividers -->
  <line x1="120" y1="48" x2="120" y2="108" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="260" y1="48" x2="260" y2="108" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="390" y1="48" x2="390" y2="108" stroke="#9CA3AF" stroke-width="1"/>

  <!-- Byte-width labels below -->
  <text x="70"  y="126" text-anchor="middle" font-size="10" fill="#94A3B8">compact (1 byte)</text>
  <text x="190" y="126" text-anchor="middle" font-size="10" fill="#94A3B8">compact (1–5 bytes)</text>
  <text x="325" y="126" text-anchor="middle" font-size="10" fill="#94A3B8">compact (1–9 bytes)</text>
  <text x="535" y="126" text-anchor="middle" font-size="10" fill="#94A3B8">variable length</text>

  <!-- Example rows -->
  <text x="350" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Example — DELTA frame carrying two ops:</text>
  <rect x="20" y="164" width="660" height="26" rx="6" fill="#1E293B"/>
  <text x="36" y="181" font-size="10" fill="#94A3B8" font-family="'JetBrains Mono',monospace">[</text>
  <text x="50" y="181" font-size="10" fill="#FCA5A5" font-family="'JetBrains Mono',monospace">0x04</text>
  <text x="90" y="181" font-size="10" fill="#94A3B8" font-family="'JetBrains Mono',monospace">,</text>
  <text x="98" y="181" font-size="10" fill="#FDE68A" font-family="'JetBrains Mono',monospace">12</text>
  <text x="117" y="181" font-size="10" fill="#94A3B8" font-family="'JetBrains Mono',monospace">,</text>
  <text x="125" y="181" font-size="10" fill="#6EE7B7" font-family="'JetBrains Mono',monospace">9</text>
  <text x="136" y="181" font-size="10" fill="#94A3B8" font-family="'JetBrains Mono',monospace">,</text>
  <text x="144" y="181" font-size="10" fill="#93C5FD" font-family="'JetBrains Mono',monospace">{"version":7,"ops":[{"op":"UPDATE","path":"/health","value":80},{"op":"UPDATE","path":"/position/x","value":5}]}</text>
  <text x="672" y="181" font-size="10" fill="#94A3B8" font-family="'JetBrains Mono',monospace">]</text>
</svg>

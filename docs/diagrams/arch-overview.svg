<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" width="800" height="530" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748B"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2563EB"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="530" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">SODP Server — Architecture Overview</text>

  <!-- ── Clients ── -->
  <g filter="url(#shadow)">
    <rect x="60" y="52" width="120" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <rect x="340" y="52" width="120" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <rect x="620" y="52" width="120" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  </g>
  <text x="120" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">WebSocket</text>
  <text x="120" y="90" text-anchor="middle" font-size="12" fill="#6D28D9">Client</text>
  <text x="400" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">WebSocket</text>
  <text x="400" y="90" text-anchor="middle" font-size="12" fill="#6D28D9">Client</text>
  <text x="680" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">WebSocket</text>
  <text x="680" y="90" text-anchor="middle" font-size="12" fill="#6D28D9">Client</text>

  <!-- Arrows from clients -->
  <line x1="120" y1="104" x2="120" y2="132" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="104" x2="400" y2="132" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="680" y1="104" x2="680" y2="132" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Convergence line -->
  <line x1="120" y1="128" x2="680" y2="128" stroke="#64748B" stroke-width="1.5"/>
  <line x1="400" y1="128" x2="400" y2="148" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="290" y="122" font-size="11" fill="#64748B">binary MessagePack frames</text>

  <!-- ── SodpServer outer box ── -->
  <rect x="18" y="150" width="764" height="362" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <rect x="18" y="150" width="764" height="28" rx="10" fill="#2563EB"/>
  <rect x="18" y="165" width="764" height="13" fill="#2563EB"/>
  <text x="400" y="169" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">SodpServer  (Arc — shared across all sessions)</text>

  <!-- ── Session box (dashed) ── -->
  <rect x="34" y="190" width="456" height="160" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="44" y="208" font-size="11" font-weight="700" fill="#1D4ED8">Session  (one Tokio task per TCP connection)</text>

  <!-- ws_rx -->
  <rect x="50" y="218" width="84" height="48" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="92" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">ws_rx</text>
  <text x="92" y="254" text-anchor="middle" font-size="10" fill="#3B82F6">inbound</text>

  <!-- frame dispatch -->
  <rect x="186" y="218" width="130" height="48" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="251" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">frame dispatch</text>
  <text x="251" y="254" text-anchor="middle" font-size="10" fill="#3B82F6">WATCH · CALL · RESUME</text>

  <!-- ws_tx -->
  <rect x="370" y="218" width="84" height="48" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="412" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">ws_tx</text>
  <text x="412" y="254" text-anchor="middle" font-size="10" fill="#3B82F6">outbound</text>

  <!-- Arrows ws_rx → dispatch → ws_tx -->
  <line x1="134" y1="242" x2="183" y2="242" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="316" y1="242" x2="367" y2="242" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Session handles labels -->
  <text x="92" y="298" text-anchor="middle" font-size="10" fill="#64748B">watches</text>
  <text x="92" y="311" text-anchor="middle" font-size="10" fill="#64748B">rate limiter</text>
  <text x="92" y="324" text-anchor="middle" font-size="10" fill="#64748B">presence</text>
  <text x="280" y="298" text-anchor="middle" font-size="10" fill="#64748B">JWT sub · claims</text>
  <text x="412" y="298" text-anchor="middle" font-size="10" fill="#64748B">channel rx</text>
  <text x="412" y="311" text-anchor="middle" font-size="10" fill="#64748B">(fanout DELTAs)</text>

  <!-- Arrows from dispatch to StateStore and FanoutBus -->
  <line x1="316" y1="242" x2="524" y2="220" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="316" y1="252" x2="524" y2="330" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- ── StateStore box ── -->
  <rect x="524" y="190" width="236" height="110" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="642" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">StateStore</text>
  <text x="642" y="228" text-anchor="middle" font-size="11" fill="#047857">DashMap&lt;key, StateEntry&gt;</text>
  <text x="642" y="245" text-anchor="middle" font-size="11" fill="#047857">global_version: AtomicU64</text>
  <text x="642" y="262" text-anchor="middle" font-size="11" fill="#047857">DeltaLog  (in-memory ring)</text>
  <text x="550" y="282" font-size="10" fill="#059669">↓ optional</text>

  <!-- Arrow StateStore → SegmentedLog -->
  <line x1="642" y1="300" x2="642" y2="316" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- ── SegmentedLog box (dashed/optional) ── -->
  <rect x="524" y="316" width="236" height="80" rx="8" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="642" y="337" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">SegmentedLog</text>
  <text x="642" y="354" text-anchor="middle" font-size="11" fill="#6B7280">on-disk append-only log</text>
  <text x="642" y="371" text-anchor="middle" font-size="11" fill="#6B7280">crash-safe  · optional</text>
  <text x="556" y="388" font-size="10" fill="#9CA3AF">seg_0000000001.log …</text>

  <!-- ── FanoutBus box ── -->
  <rect x="34" y="366" width="250" height="100" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="159" y="387" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">FanoutBus</text>
  <text x="159" y="404" text-anchor="middle" font-size="11" fill="#B45309">DashMap&lt;key, [Subscriber]&gt;</text>
  <text x="159" y="421" text-anchor="middle" font-size="11" fill="#B45309">encode delta body once</text>
  <text x="159" y="438" text-anchor="middle" font-size="11" fill="#B45309">broadcast to N watchers</text>

  <!-- ── AclRegistry + SchemaRegistry ── -->
  <rect x="300" y="366" width="152" height="100" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="376" y="387" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">AclRegistry</text>
  <text x="376" y="404" text-anchor="middle" font-size="10" fill="#64748B">read/write rules</text>
  <text x="376" y="424" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">SchemaRegistry</text>
  <text x="376" y="441" text-anchor="middle" font-size="10" fill="#64748B">type validation</text>
  <text x="376" y="458" text-anchor="middle" font-size="10" fill="#64748B">SDL (JSON file)</text>

  <!-- ── JwtConfig ── -->
  <rect x="468" y="366" width="44" height="100" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="490" y="420" text-anchor="middle" font-size="10" font-weight="600" fill="#334155" transform="rotate(-90,490,420)">JwtConfig · HS256 / RS256</text>

  <!-- Legend -->
  <rect x="34" y="498" width="12" height="12" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="52" y="509" font-size="11" fill="#64748B">WebSocket Client</text>
  <rect x="160" y="498" width="12" height="12" rx="2" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="178" y="509" font-size="11" fill="#64748B">Session (per-conn)</text>
  <rect x="300" y="498" width="12" height="12" rx="2" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="318" y="509" font-size="11" fill="#64748B">State &amp; Storage</text>
  <rect x="430" y="498" width="12" height="12" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="448" y="509" font-size="11" fill="#64748B">Fanout &amp; Broadcast</text>
  <rect x="580" y="498" width="12" height="12" rx="2" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="598" y="509" font-size="11" fill="#64748B">Optional component</text>
</svg>

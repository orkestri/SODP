<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 244" width="640" height="244"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2563EB"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="180">
      <polygon points="0 0,8 3,0 6" fill="#059669"/>
    </marker>
    <marker id="arr-d" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="180">
      <polygon points="0 0,8 3,0 6" fill="#D97706"/>
    </marker>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="640" height="244" fill="#F8FAFC" rx="12"/>

  <!-- Participants -->
  <rect x="30" y="18" width="130" height="36" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5" filter="url(#sh)"/>
  <text x="95" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">Client</text>

  <rect x="480" y="18" width="130" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" filter="url(#sh)"/>
  <text x="545" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Server</text>

  <!-- Lifelines -->
  <line x1="95" y1="54" x2="95" y2="228" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="545" y1="54" x2="545" y2="228" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- WATCH → -->
  <line x1="103" y1="82" x2="537" y2="82" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="205" y="66" width="230" height="22" rx="4" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="320" y="81" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">WATCH  { state: "game.player" }  ·  0x02</text>

  <!-- STATE_INIT ← -->
  <line x1="537" y1="118" x2="103" y2="118" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <rect x="170" y="102" width="300" height="22" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="320" y="117" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">STATE_INIT  { health: 100, initialized: true }  ·  0x03</text>

  <!-- separator -->
  <line x1="60" y1="134" x2="580" y2="134" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="320" y="147" text-anchor="middle" font-size="10" fill="#94A3B8">— another client writes health: 80 —</text>

  <!-- DELTA /health → 80 ← -->
  <line x1="537" y1="167" x2="103" y2="167" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <rect x="185" y="151" width="270" height="22" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="320" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">DELTA  { ops: [UPDATE /health → 80] }  ·  0x04</text>

  <!-- DELTA /health → 60 ← -->
  <line x1="537" y1="207" x2="103" y2="207" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <rect x="185" y="191" width="270" height="22" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="320" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">DELTA  { ops: [UPDATE /health → 60] }  ·  0x04</text>
</svg>

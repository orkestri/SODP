<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" width="520" height="560" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748B"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#059669"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="520" height="560" fill="#F8FAFC" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">Cluster Startup Sequence</text>

  <!-- Step 1: Construct SodpServer -->
  <rect x="60" y="44" width="400" height="52" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">① Construct SodpServer</text>
  <text x="260" y="80" text-anchor="middle" font-size="10" fill="#2563EB">ephemeral / persistent / with-schema</text>
  <text x="260" y="92" text-anchor="middle" font-size="9" fill="#3B82F6">StateStore populated from SegmentedLog (if log-dir given)</text>

  <line x1="260" y1="96" x2="260" y2="114" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: RedisCluster::connect -->
  <rect x="60" y="116" width="400" height="52" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#991B1B">② RedisCluster::connect(url)</text>
  <text x="260" y="152" text-anchor="middle" font-size="10" fill="#B91C1C">Open MultiplexedConnection (command channel)</text>
  <text x="260" y="164" text-anchor="middle" font-size="9" fill="#DC2626">Generate node_id (UUID v4) — used to dedup own publishes</text>

  <line x1="260" y1="168" x2="260" y2="186" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: load_state -->
  <rect x="60" y="188" width="400" height="68" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#991B1B">③ RedisCluster::load_state()</text>
  <text x="260" y="225" text-anchor="middle" font-size="10" fill="#B91C1C">HGETALL sodp:state</text>
  <text x="260" y="241" text-anchor="middle" font-size="10" fill="#B91C1C">decode rmp_serde((version, value)) per field</text>
  <text x="260" y="254" text-anchor="middle" font-size="9" fill="#94A3B8">→ Vec&lt;(key, version, value)&gt;</text>

  <line x1="260" y1="256" x2="260" y2="274" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: StateStore::load_entries -->
  <rect x="60" y="276" width="400" height="68" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">④ StateStore::load_entries(entries)</text>
  <text x="260" y="312" text-anchor="middle" font-size="10" fill="#2563EB">version-wins merge: if redis_version &gt; local → overwrite</text>
  <text x="260" y="328" text-anchor="middle" font-size="10" fill="#2563EB">advance global_version = max(redis, disk)</text>
  <text x="260" y="342" text-anchor="middle" font-size="9" fill="#3B82F6">most recent source wins (Redis usually has newer data)</text>

  <line x1="260" y1="344" x2="260" y2="362" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: spawn_subscriber -->
  <rect x="60" y="364" width="400" height="68" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">⑤ RedisCluster::spawn_subscriber()</text>
  <text x="260" y="400" text-anchor="middle" font-size="10" fill="#B45309">background Tokio task — runs for process lifetime</text>
  <text x="260" y="416" text-anchor="middle" font-size="10" fill="#B45309">PSUBSCRIBE sodp:delta:*</text>
  <text x="260" y="428" text-anchor="middle" font-size="9" fill="#94A3B8">reconnects with 2s delay on connection error</text>

  <line x1="260" y1="432" x2="260" y2="450" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Step 6: Accept connections -->
  <rect x="80" y="452" width="360" height="44" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="472" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">⑥ Begin accepting WebSocket connections</text>
  <text x="260" y="487" text-anchor="middle" font-size="10" fill="#047857">attach cluster to SodpServer → Arc::new(server)</text>

  <!-- Note about Arc::try_unwrap -->
  <rect x="40" y="514" width="440" height="36" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="260" y="530" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">Why version-wins?</text>
  <text x="260" y="545" text-anchor="middle" font-size="10" fill="#166534">Redis is typically more current (all live nodes write to it) — disk log used as fallback if Redis was restarted</text>
</svg>

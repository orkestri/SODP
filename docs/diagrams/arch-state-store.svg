<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748B"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="640" height="320" fill="#F8FAFC" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">StateStore — Data Structure</text>

  <!-- StateStore outer box -->
  <rect x="20" y="44" width="600" height="258" rx="10" fill="#FFFFFF" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="44" width="600" height="26" rx="10" fill="#059669"/>
  <rect x="20" y="57" width="600" height="13" fill="#059669"/>
  <text x="320" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">StateStore</text>

  <!-- entries: DashMap -->
  <rect x="40" y="82" width="350" height="130" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="102" font-size="12" font-weight="700" fill="#065F46">entries: DashMap&lt;String, StateEntry&gt;</text>
  <text x="60" y="120" font-size="11" fill="#047857">one shard per key name — concurrent reads, short write locks</text>

  <!-- StateEntry detail -->
  <rect x="60" y="130" width="310" height="70" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="80" y="150" font-size="11" font-weight="600" fill="#065F46">StateEntry  {</text>
  <text x="100" y="168" font-size="11" fill="#047857">version:  u64            ← global monotonic</text>
  <text x="100" y="184" font-size="11" fill="#047857">value:    serde_json::Value</text>
  <text x="80" y="198" font-size="11" font-weight="600" fill="#065F46">}</text>

  <!-- global_version -->
  <rect x="410" y="82" width="190" height="56" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="505" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">global_version</text>
  <text x="505" y="120" text-anchor="middle" font-size="11" fill="#047857">AtomicU64</text>
  <text x="505" y="133" text-anchor="middle" font-size="10" fill="#6B7280">fetch-and-increment on every write</text>

  <!-- log: DeltaLog -->
  <rect x="40" y="224" width="250" height="62" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="244" font-size="12" font-weight="700" fill="#065F46">log: DeltaLog</text>
  <text x="60" y="260" font-size="11" fill="#047857">DashMap&lt;key, Vec&lt;(version, ops)&gt;&gt;</text>
  <text x="60" y="276" font-size="10" fill="#6B7280">in-memory ring · cap 1 000 / key · RESUME replay</text>

  <!-- plog: SegmentedLog -->
  <rect x="310" y="224" width="290" height="62" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="330" y="244" font-size="12" font-weight="700" fill="#374151">plog: Option&lt;SegmentedLog&gt;</text>
  <text x="330" y="260" font-size="11" fill="#6B7280">on-disk persistence — active only when</text>
  <text x="330" y="276" font-size="10" fill="#94A3B8">log-dir argument is provided at startup</text>

  <!-- Connector lines -->
  <line x1="505" y1="138" x2="505" y2="220" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="400" y1="155" x2="404" y2="155" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="165" y1="212" x2="165" y2="222" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="455" y1="212" x2="455" y2="222" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
</svg>

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}\
{% if commit.breaking %} ⚠ **BREAKING CHANGE**{% endif %} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ "https://github.com/" ~ env.GITHUB_REPO ~ "/commit/" ~ commit.id }}))
{% endfor %}
{% endfor %}\
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "Added" },
  { message = "^fix",      group = "Fixed" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Testing" },
  { message = "^chore",    skip = true },
  { message = "^ci",       skip = true },
  { message = "^build",    skip = true },
]
protect_breaking_commits = false
filter_commits = true
# matches every package tag: go/v*, ts/v*, py/v*, java/v*, server/v*, demo/v*
tag_pattern = "(go|ts|py|java|server|demo)/v[0-9].*"
topo_order = false
sort_commits = "oldest"

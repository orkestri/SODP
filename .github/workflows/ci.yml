name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Rust server ─────────────────────────────────────────────────────────────
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, '[ci-all]') ||
      contains(toJson(github.event.pull_request.files.*.filename), 'src/') ||
      contains(toJson(github.event.pull_request.files.*.filename), 'Cargo')
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  # ── Rust benchmarks ────────────────────────────────────────────────────────
  benchmark:
    name: Rust benchmarks (criterion)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: cargo bench --bench delta --bench codec --bench state -- --output-format bencher | tee bench-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-results.txt
          retention-days: 30

  # ── TypeScript client (@sodp/client) ────────────────────────────────────────
  typescript-client:
    name: TypeScript client (build · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-ts/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  # ── React hooks (@sodp/react) ────────────────────────────────────────────────
  typescript-react:
    name: TypeScript React hooks (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Both lock files are needed: client-ts is a file: dep of react-sodp
          cache-dependency-path: |
            client-ts/package-lock.json
            react-sodp/package-lock.json

      # @sodp/client is a file: link — its dist/ is gitignored, so it must
      # be built before react-sodp can resolve the module and its type declarations.
      - name: Build @sodp/client
        working-directory: client-ts
        run: npm ci && npm run build

      - name: Build @sodp/react
        working-directory: react-sodp
        run: npm ci && npm run build

  # ── Python client (sodp) ─────────────────────────────────────────────────────
  python:
    name: Python client (install · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sodp-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]" || pip install -e .
      - name: Test
        run: python -m pytest --tb=short -q || echo "No tests found — skipping"

  # ── Java client (io.sodp:sodp-client) ───────────────────────────────────────
  java:
    name: Java client (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sodp-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn --no-transfer-progress test

  # ── Go server (sodp-go) ──────────────────────────────────────────────────────
  go:
    name: Go server (vet · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sodp-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: sodp-go/go.mod
          cache-dependency-path: sodp-go/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

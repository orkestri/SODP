name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Rust server ─────────────────────────────────────────────────────────────
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, '[ci-all]') ||
      contains(toJson(github.event.pull_request.files.*.filename), 'src/') ||
      contains(toJson(github.event.pull_request.files.*.filename), 'Cargo')
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  # ── TypeScript client (@sodp/client) ────────────────────────────────────────
  typescript-client:
    name: TypeScript client (build · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-ts/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  # ── React hooks (@sodp/react) ────────────────────────────────────────────────
  typescript-react:
    name: TypeScript React hooks (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-sodp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-sodp/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Python client (sodp) ─────────────────────────────────────────────────────
  python:
    name: Python client (install · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sodp-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]" || pip install -e .
      - name: Test
        run: python -m pytest --tb=short -q || echo "No tests found — skipping"

  # ── Java client (io.sodp:sodp-client) ───────────────────────────────────────
  java:
    name: Java client (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sodp-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn --no-transfer-progress test

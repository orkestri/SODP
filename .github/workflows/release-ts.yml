name: Release — TypeScript (npm)

on:
  push:
    tags:
      - "ts/v*"

jobs:
  publish:
    name: Publish @sodp/client and @sodp/react to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#ts/}" >> "$GITHUB_OUTPUT"

      # ── @sodp/client ──────────────────────────────────────────────────────
      - name: Install @sodp/client deps
        working-directory: client-ts
        run: npm ci

      - name: Build @sodp/client
        working-directory: client-ts
        run: npm run build

      - name: Publish @sodp/client
        working-directory: client-ts
        # Idempotent: if this tag is re-pushed after a partial failure and
        # the version is already on the registry, skip instead of crashing
        # the job with E409. Any other publish error still fails the step.
        run: |
          set -e
          version=$(node -p "require('./package.json').version")
          if npm view "@sodp/client@${version}" version > /dev/null 2>&1; then
            echo "@sodp/client@${version} is already on npm — skipping publish."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── @sodp/react ───────────────────────────────────────────────────────
      - name: Install @sodp/react deps
        working-directory: react-sodp
        run: npm ci

      - name: Build @sodp/react
        working-directory: react-sodp
        run: npm run build

      - name: Publish @sodp/react
        working-directory: react-sodp
        run: |
          set -e
          version=$(node -p "require('./package.json').version")
          if npm view "@sodp/react@${version}" version > /dev/null 2>&1; then
            echo "@sodp/react@${version} is already on npm — skipping publish."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── @sodp/server ──────────────────────────────────────────────────────
      - name: Install @sodp/server deps
        working-directory: server-ts
        run: npm ci

      - name: Test @sodp/server
        working-directory: server-ts
        run: npm test

      - name: Build @sodp/server
        working-directory: server-ts
        run: npm run build

      - name: Publish @sodp/server
        working-directory: server-ts
        run: |
          set -e
          version=$(node -p "require('./package.json').version")
          if npm view "@sodp/server@${version}" version > /dev/null 2>&1; then
            echo "@sodp/server@${version} is already on npm — skipping publish."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

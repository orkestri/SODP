name: Release — Python (PyPI)

on:
  push:
    tags:
      - "py/v*"

jobs:
  build-publish:
    name: Build and publish sodp to PyPI
    runs-on: ubuntu-latest
    # This environment must be configured in GitHub repo Settings → Environments
    # and linked as a Trusted Publisher on pypi.org — no API token needed.
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build

      - name: Build distribution
        working-directory: sodp-py
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sodp-py/dist/
